<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#166534">
    <title>Šumarija - Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f8fafc;
        }
        p {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #166534;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:active { background: #14532d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Nema internet konekcije</h1>
        <p>Provjerite internet vezu i pokušajte ponovo. Podaci koji su ranije učitani bit će dostupni kada se ponovo povežete.</p>
        <button class="btn" onclick="window.location.reload()">Pokušaj ponovo</button>
    </div>
</body>
</html>
